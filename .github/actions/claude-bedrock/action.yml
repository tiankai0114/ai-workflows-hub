name: 'Claude via LiteLLM'
description: >
  Invoke claude-code-action via LiteLLM proxy (Anthropic-compatible API).
  No AWS credentials required — authenticates with an API key.

inputs:
  prompt:
    description: 'Prompt to send to Claude'
    required: true
  github_token:
    description: 'GitHub token for API access'
    required: true
  api_key:
    description: 'LiteLLM API key (ANTHROPIC_AUTH_TOKEN)'
    required: true
  max_turns:
    description: 'Maximum number of agentic turns'
    required: false
    default: '30'
  allowed_bots:
    description: 'Comma-separated bot logins allowed to trigger the action (empty = no restriction)'
    required: false
    default: ''
  show_full_output:
    description: 'Stream the full Claude output to the Actions log'
    required: false
    default: 'false'
  figma_token:
    description: >
      Figma Personal Access Token. When non-empty, registers the official
      Figma MCP server (https://mcp.figma.com) so Claude can call
      get_design_context, get_screenshot, get_metadata, etc.
      Leave empty to skip MCP registration entirely.
    required: false
    default: ''
  bot_id:
    description: >
      GitHub user ID for git config user.email attribution.
      Format: <bot_id>+<bot_name>@users.noreply.github.com
      Set to your GitHub App bot's user ID for correct commit attribution.
      Defaults to github-actions[bot] (41898282) if not set.
    required: false
    default: ''
  bot_name:
    description: >
      GitHub login for git config user.name and noreply email name segment.
      Pair with bot_id. Defaults to claude[bot] if not set.
    required: false
    default: ''
  model:
    description: >
      Model name as configured in LiteLLM proxy.
      Defaults to claude4.6-bedrock.
    required: false
    default: 'claude4.6-bedrock'

# ─── Pinned versions ───────────────────────────────────────────────────────────
# claude-code-action: v1.0.101
# default model:     claude4.6-bedrock (LiteLLM alias)
# LiteLLM base URL:  https://us-ailab-api.telenav.com
# Figma MCP:         Official server at https://mcp.figma.com/v1/sse
# ──────────────────────────────────────────────────────────────────────────────

runs:
  using: composite
  steps:
    - name: Write Figma MCP config
      if: inputs.figma_token != ''
      shell: bash
      env:
        FIGMA_TOKEN: ${{ inputs.figma_token }}
      run: |
        command -v jq >/dev/null 2>&1 || { echo "::error::jq is required but not found."; exit 1; }
        mkdir -p "${RUNNER_TEMP}"
        jq -n \
          --arg tok "${FIGMA_TOKEN}" \
          '{mcpServers:{figma:{type:"sse",url:"https://mcp.figma.com/v1/sse",headers:{"X-Figma-Token":$tok}}}}' \
          > "${RUNNER_TEMP}/figma-mcp-config.json"

    - name: Invoke Claude
      uses: anthropics/claude-code-action@v1.0.101
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        ANTHROPIC_BASE_URL: "https://us-ailab-api.telenav.com"
        MCP_TIMEOUT: '60000'
      with:
        anthropic_api_key: ${{ inputs.api_key }}
        github_token: ${{ inputs.github_token }}
        prompt: ${{ inputs.prompt }}
        allowed_bots: ${{ inputs.allowed_bots }}
        show_full_output: ${{ inputs.show_full_output }}
        bot_id: ${{ inputs.bot_id != '' && inputs.bot_id || '41898282' }}
        bot_name: ${{ inputs.bot_name != '' && inputs.bot_name || 'claude[bot]' }}
        claude_args: >-
          --model ${{ inputs.model }}
          --max-turns ${{ inputs.max_turns }}
          --dangerously-skip-permissions
          ${{ inputs.figma_token != '' && format('--mcp-config {0}/figma-mcp-config.json --allowedTools mcp__figma__get_design_context,mcp__figma__get_screenshot,mcp__figma__get_metadata', runner.temp) || '' }}
