name: "PGE: Planner"

# Reusable workflow — called by the consumer repo's trigger file.
# Consumer trigger example:
#   on: { issues: { types: [labeled] } }
#   jobs:
#     plan:
#       if: github.event.label.name == 'pge/status:ready'
#       uses: tiankai0114/ai-workflows-hub/.github/workflows/pge-plan.yml@v1
#       with:
#         bot_name: "your-app[bot]"
#         bot_id: "YOUR_BOT_ID"
#       secrets:
#         figma_token: ${{ secrets.FIGMA_TOKEN }}

on:
  workflow_call:
    inputs:
      bot_id:
        description: 'GitHub App bot user ID for commit attribution'
        required: false
        type: string
        default: ''
      bot_name:
        description: 'GitHub App bot login name'
        required: false
        type: string
        default: ''
      model:
        description: 'Bedrock model ID (defaults to claude-sonnet-4-6)'
        required: false
        type: string
        default: 'us.anthropic.claude-sonnet-4-6'
      aws_role:
        description: 'IAM Role ARN for Bedrock access'
        required: true
        type: string
      aws_region:
        description: 'AWS region for Bedrock'
        required: false
        type: string
        default: 'us-west-2'
      project_context:
        description: >
          Optional project-specific context prepended to the planning prompt.
          Use this to describe the tech stack, architecture pattern, or constraints
          the Planner should be aware of when analyzing the issue and generating the plan.
          If omitted, Claude reads CLAUDE.md for project context.
        required: false
        type: string
        default: ''
    secrets:
      figma_token:
        description: 'Figma Personal Access Token (optional, enables design context)'
        required: false


permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  pge-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch planning history
        id: history
        uses: actions/github-script@v7
        with:
          script: |
            const { writeFileSync } = await import('fs');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });

            const lastPlanIndex = comments.findLastIndex(c =>
              c.body && c.body.includes('<!-- MILESTONES_START -->')
            );

            const feedbackComments = lastPlanIndex >= 0
              ? comments.slice(lastPlanIndex + 1)
              : [];

            const hasHistory = lastPlanIndex >= 0;
            const hasFeedback = feedbackComments.length > 0;

            if (hasHistory) {
              let historyText = `---LAST PLAN (${comments[lastPlanIndex].created_at})---\n${comments[lastPlanIndex].body}`;
              if (hasFeedback) {
                historyText += '\n\n' + feedbackComments
                  .map(c => `---FEEDBACK (${c.created_at} by ${c.user.login})---\n${c.body}`)
                  .join('\n\n');
              }
              writeFileSync('/tmp/planner-history.md', historyText);
            }

            core.setOutput('has_history', String(hasHistory));
            core.setOutput('has_feedback', String(hasFeedback));
            core.setOutput('feedback_count', String(feedbackComments.length));
            core.setOutput('comment_count_before', String(comments.length));
            console.log(`Last plan found: ${hasHistory}, Feedback: ${feedbackComments.length}, Total: ${comments.length}`);

      - name: Detect Figma references
        id: detect-figma
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh issue view "$ISSUE_NUMBER" --comments --repo "$GH_REPO" \
               --json body,comments \
             | jq -r '.body, (.comments[].body // "")' \
             | grep -iE 'figma\.com/(design|file|proto)/' > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # ══════════════════════════════════════════════════════════════
      # Iteration 1 — Initial analysis: identify open questions
      # ══════════════════════════════════════════════════════════════
      - name: "Iteration 1: Analyze & identify questions"
        id: iter1-analyze
        uses: tiankai0114/ai-workflows-hub/.github/actions/claude-bedrock@v1
        with:
          github_token: ${{ github.token }}
          figma_token: ${{ steps.detect-figma.outputs.found == 'true' && secrets.figma_token || '' }}
          aws_role: ${{ inputs.aws_role }}
          aws_region: ${{ inputs.aws_region }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          model: ${{ inputs.model }}
          max_turns: '100'
          prompt: |
            ${{ inputs.project_context != '' && format('## Project Context (provided by repo owner)\n\n{0}\n\n---\n\n', inputs.project_context) || '' }}You are the **Planner** for this project.

            ## Reading the issue

            Run the following command to read the full issue body AND all existing comments:

            ```bash
            gh issue view ${{ env.ISSUE_NUMBER }} --comments --repo ${{ env.GH_REPO }}
            ```

            ${{ steps.history.outputs.has_history == 'true' && 'This issue has been planned before (re-trigger). Read /tmp/planner-history.md — it contains the previous plan and any human feedback posted after it. You MUST produce a NEW plan that incorporates the feedback. Do NOT reuse the old plan as-is.' || '' }}

            Your task for THIS step:
            1. If `CLAUDE.md` exists at the repo root, read it to understand the project structure
               and available SKILL files. If it does not exist, infer the project structure from
               the issue content and directory listing, then proceed.
            2. If `.cursor/skills/` exists, read the relevant baseline skills before planning:
               - `.cursor/skills/clean-code/SKILL.md` (if it exists)
               - `.cursor/skills/refactor/SKILL.md` (if it exists)
               If the directory does not exist, skip this step entirely — do NOT waste a turn
               attempting to read non-existent files.
            3. Based on the issue content AND all comments, identify affected domains and read
               those SKILL files if they exist.
            4. Perform impact analysis: which sub-projects, directories, and components are affected
            5. Identify any **open questions** — raise a question for ANY of the following:
               - Ambiguity in requirements or acceptance criteria
               - Design decisions with multiple valid approaches
               - **Feature, behavior, approach, or technical choice mentioned ANYWHERE in the
                 issue body or comments that is NOT explicitly required by the acceptance criteria**
                 — even if the author frames it as a "note", "consideration", "alternative", or
                 "we might also…". These are the highest-value questions because they define what
                 is explicitly OUT of scope. Without an explicit exclusion the Generator may
                 implement the mentioned item as speculative scope creep.
                 Example: if the issue says "We might also add caching…" but the AC only requires
                 a new endpoint — raise: "Caching is mentioned but not in the AC. Should it be
                 included? If not, we should explicitly exclude it."

            ## Figma references

            If the tool `mcp__figma__get_design_context` is available AND the issue contains a URL of the form
              https://www.figma.com/design/<fileKey>/...?node-id=<a>-<b>
            extract `<fileKey>` and convert `<a>-<b>` to `<a>:<b>`, then call `mcp__figma__get_design_context`
            and `mcp__figma__get_screenshot` BEFORE writing your analysis.
            If the tools are not available, ignore this section.

            ## CRITICAL: HOW TO POST YOUR OUTPUT

            Your response text is NOT automatically posted. You MUST use `gh issue comment`:

            ```bash
            cat > /tmp/planner-output.md << 'PLAN_EOF'
            <your formatted output here>
            PLAN_EOF
            gh issue comment ${{ env.ISSUE_NUMBER }} --body-file /tmp/planner-output.md
            ```

            ## CRITICAL OUTPUT FORMAT RULES

            You MUST output FORMAT A. FORMAT B is not allowed in Iteration 1.

            **FORMAT A — Required for ALL cases (with OR without open questions):**

            ## ❓ Open Questions (Iteration 1)

            The following questions need to be resolved before finalizing the plan:

            1. **[Short title]** — [Detailed question with context]

            **Explicitly excluded** — The following were mentioned in the issue body or comments but
            are NOT in the acceptance criteria and will NOT be implemented:
            - `featureX` — mentioned as "might also…" in the issue; out of scope for this milestone
            - Write "None — issue body contains no mentions outside the acceptance criteria." if empty

            **If you have NO open questions**, still post FORMAT A with the `<!-- NO_OPEN_QUESTIONS -->` marker:

            ## ❓ Open Questions (Iteration 1)

            <!-- NO_OPEN_QUESTIONS -->
            No open questions identified. Proceeding to plan.

            - **Scope confirmation** — [Brief confirmation that requirements are unambiguous]
            - **Explicitly excluded** — [MANDATORY — list every feature/behavior/approach mentioned
              anywhere in the issue body or comments that is NOT in the acceptance criteria, together
              with a one-line justification. This list is the Generator's explicit scope boundary.
              Write "None — issue body contains no mentions outside the acceptance criteria." if truly
              nothing was mentioned. A missing or empty Explicitly excluded section is a Planner
              protocol violation.]

            ## Rules
            - You MUST post via `gh issue comment`
            - Your post MUST start with `## ❓ Open Questions`
            - FORMAT B (the final plan) is NOT allowed in Iteration 1
            - **Explicitly excluded** is MANDATORY in every Iteration 1 output — even when you have
              open questions. If the list is empty, write "None".
            - Stay high-level. Define WHAT, not HOW.
            - Do NOT create PRs or write code.
            - Add appropriate `pge/scope:` and `pge/domain:` labels to the issue.

      - name: "Iteration 1: Check result"
        id: iter1-check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });
            const countBefore = parseInt('${{ steps.history.outputs.comment_count_before }}') || 0;
            const newComments = comments.slice(countBefore);
            const latest = newComments[newComments.length - 1];
            const body = (latest && latest.body) || '';
            const hasPlan = body.includes('<!-- MILESTONES_START -->');
            const hasQuestions = body.includes('## ❓ Open Questions') && !body.includes('<!-- NO_OPEN_QUESTIONS -->');
            core.setOutput('has_plan', String(hasPlan));
            core.setOutput('needs_answers', String(hasQuestions && !hasPlan));

      - name: "Iteration 1: Answer open questions"
        if: steps.iter1-check.outputs.needs_answers == 'true'
        uses: tiankai0114/ai-workflows-hub/.github/actions/claude-bedrock@v1
        with:
          github_token: ${{ github.token }}
          figma_token: ${{ steps.detect-figma.outputs.found == 'true' && secrets.figma_token || '' }}
          aws_role: ${{ inputs.aws_role }}
          aws_region: ${{ inputs.aws_region }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          model: ${{ inputs.model }}
          max_turns: '50'
          prompt: |
            You are the **Planner's Advisor** for this project.

            Read the issue #${{ env.ISSUE_NUMBER }} and ALL its comments
            (`gh issue view ${{ env.ISSUE_NUMBER }} --comments --repo ${{ env.GH_REPO }}`).
            The latest comment contains open questions from the Planner.

            Read CLAUDE.md, `.cursor/skills/clean-code/SKILL.md`, `.cursor/skills/refactor/SKILL.md`,
            and the relevant sub-project SKILL files to ground your answers.

            ## Verdict framework — assign ONE of three verdicts to every question

            **❌ EXCLUDE** — The feature/behavior/approach is NOT in the acceptance criteria and should
            NOT be implemented in this issue. Use this as the default for any scope-inclusion question
            where the AC does not explicitly require it. Generator treats ❌ as a hard scope boundary.

            **✅ INCLUDE** — The feature/behavior IS clearly required by the AC or is logically
            necessary (without it the AC cannot be satisfied). Must cite the specific AC item.
            Include brief implementation guidance (1–3 bullets, WHAT not HOW).

            **🔶 CLARIFY** — Genuinely ambiguous: reasonable engineers disagree AND it materially
            changes scope or architecture. Use sparingly — prefer a defensible EXCLUDE over a CLARIFY.
            When you use CLARIFY, post a focused question to the issue thread so the human author
            can decide. Do NOT leave the Planner waiting for an answer that may never come.

            **Tiebreaker rules:**
            - If in doubt between EXCLUDE and CLARIFY → use EXCLUDE.
            - If in doubt between INCLUDE and CLARIFY → use CLARIFY.
            - Never leave a verdict blank.

            ## Output format

            **CRITICAL:** Post your output using `gh issue comment`:
            ```bash
            cat > /tmp/advisor-output.md << 'ADVISOR_EOF'
            ## 💡 Recommended Answers (Iteration 1)

            1. **[Short title]**
               - **Verdict:** ❌ EXCLUDE | ✅ INCLUDE | 🔶 CLARIFY
               - **Rationale:** [1–2 sentences — cite AC item number or "not mentioned in AC"]
               - **If INCLUDE — implementation hints:** [1–3 bullets, WHAT not HOW; omit for EXCLUDE/CLARIFY]
               - **If CLARIFY — question for author:** [Exact question to post; omit for EXCLUDE/INCLUDE]

            ---
            **Summary table**
            | # | Question | Verdict |
            |---|----------|---------|
            | 1 | [Short title] | ❌ EXCLUDE |
            ADVISOR_EOF
            gh issue comment ${{ env.ISSUE_NUMBER }} --body-file /tmp/advisor-output.md
            ```

            Principles: prefer simplicity, follow existing patterns, be opinionated, default to EXCLUDE.

      # ══════════════════════════════════════════════════════════════
      # Iteration 2 — Re-analyze with answers
      # ══════════════════════════════════════════════════════════════
      - name: "Iteration 2: Re-analyze with answers"
        if: steps.iter1-check.outputs.needs_answers == 'true'
        id: iter2-analyze
        uses: tiankai0114/ai-workflows-hub/.github/actions/claude-bedrock@v1
        with:
          github_token: ${{ github.token }}
          figma_token: ${{ steps.detect-figma.outputs.found == 'true' && secrets.figma_token || '' }}
          aws_role: ${{ inputs.aws_role }}
          aws_region: ${{ inputs.aws_region }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          model: ${{ inputs.model }}
          max_turns: '50'
          prompt: |
            You are the **Planner** for this project (iteration 2).

            Read issue #${{ env.ISSUE_NUMBER }} and ALL its comments
            (`gh issue view ${{ env.ISSUE_NUMBER }} --comments --repo ${{ env.GH_REPO }}`).

            Read CLAUDE.md, `.cursor/skills/clean-code/SKILL.md`, `.cursor/skills/refactor/SKILL.md`,
            and the relevant sub-project SKILL files.

            Review the recommended answers from iteration 1. If NEW questions exist, post
            `## ❓ Open Questions (Iteration 2)`. If all resolved, post the final `## 📋 Planner Analysis`.

            **DO NOT** use the `<!-- NO_OPEN_QUESTIONS -->` marker in this iteration.
            By Iteration 2 you MUST emit either the final plan (FORMAT B) or new questions.

            **CRITICAL:** Post via `gh issue comment`. See the Planner Analysis template below.

            Planner Analysis template:
            ```
            ## 📋 Planner Analysis

            ### Impact Analysis
            | Sub-project | Directories / Components affected |
            |-------------|----------------------------------|
            | ... | ... |

            ### Skills Referenced
            - `.cursor/skills/clean-code/SKILL.md` — cross-repo quality baseline (MANDATORY)
            - `.cursor/skills/refactor/SKILL.md` — cross-repo refactor protocol (MANDATORY)
            - `<sub-project>/.cursor/skills/development-standard/SKILL.md` — for each affected sub-project

            ### Technical Considerations
            - Architecture constraints, dependencies, risks

            ### Resolved Questions
            - [Summary of each question and the chosen answer]

            ### Explicitly excluded
            The following were mentioned in the issue or prior Q&A but are NOT in the acceptance
            criteria and will NOT be implemented:
            - `featureX` — mentioned as "might also…"; Advisor verdict ❌ EXCLUDE
            - Write "None — no out-of-scope items mentioned." if truly nothing was mentioned.
            *This section is the Generator's hard scope boundary. Any item not listed here
            and not in the Sprint Contract is implicitly excluded.*

            <!-- MILESTONES_START -->
            ### Milestones
            #### Milestone 1 — `{scope}`: {title}
            **Sub-project:** {sub-project}
            **Depends on:** none | Milestone N

            <!-- SPRINT_CONTRACT_START -->
            #### Sprint Contract — Milestone 1
            - [ ] Acceptance criterion 1
            <!-- SPRINT_CONTRACT_END -->
            <!-- MILESTONES_END -->
            ```

      - name: "Iteration 2: Check result"
        if: steps.iter1-check.outputs.needs_answers == 'true'
        id: iter2-check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });
            const countBefore = parseInt('${{ steps.history.outputs.comment_count_before }}') || 0;
            const newComments = comments.slice(countBefore);
            const latest = newComments[newComments.length - 1];
            const body = (latest && latest.body) || '';
            const hasPlan = body.includes('<!-- MILESTONES_START -->');
            const hasQuestions = body.includes('## ❓ Open Questions') && !body.includes('<!-- NO_OPEN_QUESTIONS -->');
            core.setOutput('has_plan', String(hasPlan));
            core.setOutput('needs_answers', String(hasQuestions && !hasPlan));

      - name: "Iteration 2: Answer open questions"
        if: steps.iter2-check.outputs.needs_answers == 'true'
        uses: tiankai0114/ai-workflows-hub/.github/actions/claude-bedrock@v1
        with:
          github_token: ${{ github.token }}
          figma_token: ${{ steps.detect-figma.outputs.found == 'true' && secrets.figma_token || '' }}
          aws_role: ${{ inputs.aws_role }}
          aws_region: ${{ inputs.aws_region }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          model: ${{ inputs.model }}
          max_turns: '50'
          prompt: |
            You are the **Planner's Advisor** for this project.

            Read issue #${{ env.ISSUE_NUMBER }} and ALL its comments
            (`gh issue view ${{ env.ISSUE_NUMBER }} --comments --repo ${{ env.GH_REPO }}`).
            The latest comment contains open questions (iteration 2).

            Read CLAUDE.md, `.cursor/skills/clean-code/SKILL.md`, `.cursor/skills/refactor/SKILL.md`,
            and relevant SKILL files to ground your answers.

            ## Verdict framework — assign ONE of three verdicts to every question

            **❌ EXCLUDE** — The feature/behavior/approach is NOT in the acceptance criteria and should
            NOT be implemented. Default for any scope-inclusion question not explicitly in the AC.
            Generator treats ❌ as a hard scope boundary.

            **✅ INCLUDE** — Clearly required by the AC or logically necessary. Must cite the specific
            AC item. Include brief implementation guidance (1–3 bullets, WHAT not HOW).

            **🔶 CLARIFY** — Genuinely ambiguous AND materially changes scope/architecture. Use
            sparingly — prefer a defensible EXCLUDE. When used, post a focused question so the human
            author can decide. By iteration 2 this should be rare; the Planner MUST produce a plan
            in the next step regardless.

            **Tiebreaker rules:**
            - If in doubt between EXCLUDE and CLARIFY → use EXCLUDE.
            - If in doubt between INCLUDE and CLARIFY → use CLARIFY.
            - Never leave a verdict blank.

            Post output via `gh issue comment` with the following format:
            ```bash
            cat > /tmp/advisor-output.md << 'ADVISOR_EOF'
            ## 💡 Recommended Answers (Iteration 2)

            1. **[Short title]**
               - **Verdict:** ❌ EXCLUDE | ✅ INCLUDE | 🔶 CLARIFY
               - **Rationale:** [1–2 sentences — cite AC item or "not mentioned in AC"]
               - **If INCLUDE — implementation hints:** [1–3 bullets; omit for EXCLUDE/CLARIFY]
               - **If CLARIFY — question for author:** [Exact question; omit for EXCLUDE/INCLUDE]

            ---
            **Summary table**
            | # | Question | Verdict |
            |---|----------|---------|
            | 1 | [Short title] | ❌ EXCLUDE |
            ADVISOR_EOF
            gh issue comment ${{ env.ISSUE_NUMBER }} --body-file /tmp/advisor-output.md
            ```

      # ══════════════════════════════════════════════════════════════
      # Iteration 3 — Final (must produce plan)
      # ══════════════════════════════════════════════════════════════
      - name: "Iteration 3: Final analysis (must produce plan)"
        if: |
          steps.iter1-check.outputs.has_plan != 'true' &&
          steps.iter2-check.outputs.has_plan != 'true'
        uses: tiankai0114/ai-workflows-hub/.github/actions/claude-bedrock@v1
        with:
          github_token: ${{ github.token }}
          figma_token: ${{ steps.detect-figma.outputs.found == 'true' && secrets.figma_token || '' }}
          aws_role: ${{ inputs.aws_role }}
          aws_region: ${{ inputs.aws_region }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          model: ${{ inputs.model }}
          max_turns: '100'
          prompt: |
            You are the **Planner** for this project (FINAL iteration).

            Read issue #${{ env.ISSUE_NUMBER }} and ALL its comments
            (`gh issue view ${{ env.ISSUE_NUMBER }} --comments --repo ${{ env.GH_REPO }}`).

            Read CLAUDE.md, `.cursor/skills/clean-code/SKILL.md`, `.cursor/skills/refactor/SKILL.md`,
            and the relevant sub-project SKILL files.

            ## Two scenarios — pick the one that applies

            **Scenario A — Advisor answers from iterations 1–2 are sufficient (most common):**
            The prior Advisor comment resolved all questions and you have everything needed to
            write the plan. Skip any further Q&A. Post the final `## 📋 Planner Analysis` now.
            Use the Advisor's EXCLUDE verdicts to populate the `Explicitly excluded` section and
            its INCLUDE verdicts to confirm scope.

            **Scenario B — A genuinely NEW critical question emerged while reading the comments:**
            This is rare. Use it ONLY when an issue that was NOT raised in iterations 1–2 would
            materially change architecture or scope and cannot be resolved by defaulting to EXCLUDE.
            In this case:
            1. Post `## ❓ Open Questions (Iteration 3 — final round)` with the new question(s).
            2. **In the same turn**, immediately post a follow-up comment with your best-effort
               plan using the EXCLUDE default for unresolved items. Label it:
               `## 📋 Planner Analysis (provisional — pending Iteration 3 answers)`.
            You MUST produce the plan in this step. An open-questions comment alone is NOT
            acceptable — this run has no further iterations.

            The final `### Skills Referenced` MUST include the two baselines AND every touched
            sub-project's `development-standard/SKILL.md`.

            **CRITICAL:** Post the final plan via `gh issue comment` using the exact HTML comment markers:
            ```bash
            cat > /tmp/planner-output.md << 'PLAN_EOF'
            ## 📋 Planner Analysis
            ...

            ### Explicitly excluded
            The following were mentioned in the issue or prior Q&A but are NOT in the acceptance
            criteria and will NOT be implemented:
            - `featureX` — Advisor verdict ❌ EXCLUDE (or defaulted to EXCLUDE)
            - Write "None — no out-of-scope items mentioned." if truly nothing was mentioned.

            <!-- MILESTONES_START -->
            ### Milestones
            #### Milestone 1 — `{scope}`: {title}
            <!-- SPRINT_CONTRACT_START -->
            #### Sprint Contract — Milestone 1
            - [ ] Acceptance criterion 1
            <!-- SPRINT_CONTRACT_END -->
            <!-- MILESTONES_END -->
            PLAN_EOF
            gh issue comment ${{ env.ISSUE_NUMBER }} --body-file /tmp/planner-output.md
            ```

            Stay high-level. Define WHAT, not HOW. Use `- [ ]` for acceptance criteria.

      # ══════════════════════════════════════════════════════════════
      # Post-plan: verify
      # ══════════════════════════════════════════════════════════════
      - name: Verify plan was posted
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });
            const countBefore = parseInt('${{ steps.history.outputs.comment_count_before }}') || 0;
            const newComments = comments.slice(countBefore);
            const newPlanComment = newComments.findLast(c =>
              c.body && c.body.includes('<!-- MILESTONES_START -->')
            );
            if (!newPlanComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: '⚠️ **Planner failed to produce a final plan.** Please check the [workflow run](' +
                  `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` +
                  ') for details and re-trigger by removing and re-adding the `pge/status:ready` label.'
              });
              core.setFailed('No new Planner Analysis comment was posted during this run.');
            } else {
              console.log('✅ New plan verified:', newPlanComment.html_url);
            }
