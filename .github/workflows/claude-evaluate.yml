name: "PGE: Evaluator"

# Reusable workflow — evaluates Generator PRs, handles human rework triggers,
# and advances milestones after merge.
#
# mode: "evaluate"         — run Claude Evaluator on a bot-authored PR
# mode: "human-rework"     — human CHANGES_REQUESTED on bot PR → add pge/pr:needs-rework
# mode: "milestone-advance"— a milestone PR was merged → trigger next milestone
#
# Consumer trigger example (pge-evaluate.yml in consumer repo):
#   on:
#     pull_request:      { types: [opened, synchronize, closed] }
#     pull_request_review: { types: [submitted] }
#     workflow_dispatch:
#       inputs: { pr_number: { required: true, type: string } }
#   jobs:
#     human-rework:
#       if: github.event_name == 'pull_request_review' && ...
#       uses: tiankai0114/ai-workflows-hub/.github/workflows/claude-evaluate.yml@v1
#       with: { mode: "human-rework", pr_number: ... }
#     evaluate:
#       if: github.event_name == 'workflow_dispatch' || ...
#       uses: tiankai0114/ai-workflows-hub/.github/workflows/claude-evaluate.yml@v1
#       with: { mode: "evaluate", pr_number: ... }
#     milestone-advance:
#       if: github.event.action == 'closed' && github.event.pull_request.merged == true && ...
#       uses: tiankai0114/ai-workflows-hub/.github/workflows/claude-evaluate.yml@v1
#       with: { mode: "milestone-advance", pr_number: ... }

on:
  workflow_call:
    inputs:
      bot_id:
        description: 'GitHub App bot user ID'
        required: false
        type: string
        default: ''
      bot_name:
        description: 'GitHub App bot login name'
        required: false
        type: string
        default: ''
      mode:
        description: '"evaluate" | "human-rework" | "milestone-advance"'
        required: true
        type: string
      pr_number:
        description: 'PR number to evaluate or advance'
        required: true
        type: string
      model:
        description: 'Bedrock model ID'
        required: false
        type: string
        default: 'us.anthropic.claude-sonnet-4-6'
      aws_role:
        description: 'IAM Role ARN for Bedrock access'
        required: true
        type: string
      aws_region:
        description: 'AWS region for Bedrock'
        required: false
        type: string
        default: 'us-west-2'
      project_context:
        description: >
          Optional project-specific context prepended to the evaluation prompt.
          Use this to describe the tech stack, architecture pattern, or special
          evaluation focus areas. If omitted, Claude reads CLAUDE.md for project context.
        required: false
        type: string
        default: ''
    secrets:
      github_app_id:
        description: 'GitHub App ID'
        required: true
      github_app_private_key:
        description: 'GitHub App private key PEM'
        required: true
      figma_token:
        description: 'Figma PAT (optional, for evaluate mode)'
        required: false


permissions:
  contents: read
  id-token: write
  pull-requests: write
  issues: write
  statuses: read

jobs:
  # ─── Human review CHANGES_REQUESTED → add pge/pr:needs-rework ───────────────
  human-review-rework:
    if: inputs.mode == 'human-rework'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.github_app_id }}
          private-key: ${{ secrets.github_app_private_key }}

      - name: Add needs-rework label
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: 'pge/pr:approved'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['pge/pr:needs-rework']
            });
            console.log(`Human review requested changes on PR #${prNumber} — added pge/pr:needs-rework`);

  # ─── Claude Evaluator ────────────────────────────────────────────────────────
  claude-evaluate:
    if: inputs.mode == 'evaluate'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Remove stale evaluation labels
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            for (const label of ['pge/pr:approved', 'pge/pr:needs-rework', 'pge/pr:rejected', 'pge/pr:blocked-by-harness']) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: label
              }).catch(() => {});
            }

      - name: Resolve PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('number', prNumber);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('title', pr.title);
            console.log(`Evaluating PR #${prNumber}: ${pr.title}`);

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Detect push mode (human vs bot)
        id: push-mode
        uses: actions/github-script@v7
        with:
          script: |
            const sender = context.payload.sender?.login ?? '';
            const isHumanPush =
              context.eventName === 'pull_request' &&
              context.payload.action === 'synchronize' &&
              !sender.endsWith('[bot]') &&
              sender !== 'github-actions[bot]';
            core.setOutput('human_push', isHumanPush ? 'true' : 'false');

      - name: Collect verification results from changed files
        id: verify-results
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 300,
            });
            const paths = files.map(f => f.filename);
            core.setOutput('changed_paths', paths.join('\n'));
            core.setOutput('summary', 'Changed files: ' + paths.length + '. Run `CLAUDE.md` build commands to verify.');

      # ── Optional: run consumer verification script ─────────────────────────────
      # If the consumer repo provides .github/scripts/pge-verify.sh, run it now.
      # The script receives CHANGED_PATHS (newline-separated) and PR_NUMBER as env
      # vars and is expected to exit 0 on success, non-zero on failure.
      # If the file does not exist, this step is skipped and Claude falls back to
      # checking the PR description (same behaviour as before).
      - name: Run consumer verification script (if present)
        id: verify-script
        continue-on-error: true
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          CHANGED_PATHS: ${{ steps.verify-results.outputs.changed_paths }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f ".github/scripts/pge-verify.sh" ]; then
            echo "Found .github/scripts/pge-verify.sh — running..."
            chmod +x .github/scripts/pge-verify.sh
            if bash .github/scripts/pge-verify.sh; then
              echo "result=pass" >> "$GITHUB_OUTPUT"
            else
              echo "result=fail" >> "$GITHUB_OUTPUT"
            fi
            echo "ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "No .github/scripts/pge-verify.sh found — skipping (Claude will rely on PR description)."
            echo "ran=false" >> "$GITHUB_OUTPUT"
            echo "result=skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.github_app_id }}
          private-key: ${{ secrets.github_app_private_key }}

      - name: Run Harness Guard
        id: harness
        uses: tiankai0114/ai-workflows-hub/.github/actions/harness-guard@feature/REL-15337-add-new-paradigms
        with:
          github_token: ${{ github.token }}
          pr_number: ${{ inputs.pr_number }}
          bot_name: ${{ inputs.bot_name }}
          summary_path: harness-summary.json

      - name: Upload Harness summary
        uses: actions/upload-artifact@v4
        with:
          name: harness-summary-${{ inputs.pr_number }}
          path: harness-summary.json
          if-no-files-found: error

      - name: Block PR when Harness fails
        if: steps.harness.outputs.status == 'fail'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const prNumber = parseInt('${{ inputs.pr_number }}');
            const summary = JSON.parse(fs.readFileSync('harness-summary.json', 'utf8'));
            const blocking = (summary.findings || []).filter(f => f.severity === 'blocking');
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: 'pge/pr:approved'
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['pge/pr:blocked-by-harness', 'pge/pr:needs-rework']
            });
            const findingsText = blocking.length
              ? blocking.map(f => `- **${f.code}**${f.path ? ` (${f.path})` : ''}: ${f.message}`).join('\n')
              : '- Harness reported failure without detailed blocking findings.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '## Harness Blocked This PR',
                '',
                'Deterministic Harness checks failed, so Claude Evaluator was skipped. Fix the blocking findings and re-run evaluation.',
                '',
                '### Blocking findings',
                findingsText,
                '',
                `Harness summary artifact: \`harness-summary-${{ inputs.pr_number }}\``
              ].join('\n')
            });

      # ── CI gate: block Claude if pge-verify.sh reported a failure ──────────────
      # Uses the app token so pge/pr:needs-rework triggers the Rework workflow.
      # Human pushes to bot PRs are NOT gated — they get a comment instead.
      - name: CI gate — block on verification failure (bot push / rework)
        if: steps.verify-script.outputs.result == 'fail' && steps.push-mode.outputs.human_push != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['pge/pr:needs-rework'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '🔴 **CI Gate blocked Evaluator** — `.github/scripts/pge-verify.sh` exited with a non-zero code.',
                '',
                'Fix the build/lint/test failures before the Evaluator can run.',
              ].join('\n'),
            });
            core.setFailed('Verification script failed — Evaluator blocked.');

      - name: CI gate — notify failures (human push, observation mode)
        if: steps.verify-script.outputs.result == 'fail' && steps.push-mode.outputs.human_push == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ inputs.pr_number }}'),
              body: [
                '🔴 **CI failures detected on human push** — `.github/scripts/pge-verify.sh` exited with a non-zero code.',
                '',
                '> ℹ️ This push was made by a human developer. The Evaluator is running in **observation mode** — no `pge/pr:needs-rework` label has been added. Fix these before merging.',
              ].join('\n'),
            });

      - name: Detect Figma references
        if: steps.harness.outputs.status != 'fail'
        id: detect-figma
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json body --jq '.body' || echo "")
          RESOLVED_ISSUE=$(echo "$PR_BODY" | grep -oE 'pge-source-issue:[[:space:]]*[0-9]+' | grep -oE '[0-9]+' | head -n1 || echo "")
          if {
            if [ -n "$RESOLVED_ISSUE" ]; then
              gh issue view "$RESOLVED_ISSUE" --comments --repo "$GH_REPO" \
                   --json body,comments \
                | jq -r '.body, (.comments[].body // "")' || true
            fi
            gh pr view "$PR_NUMBER" --repo "$GH_REPO" \
                 --json body,comments,reviews \
              | jq -r '.body, (.comments[].body // ""), (.reviews[].body // "")' || true
            gh api "repos/$GH_REPO/pulls/$PR_NUMBER/comments" --jq '.[].body' || true
          } | grep -iE 'figma\.com/(design|file|proto)/' > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: tiankai0114/ai-workflows-hub/.github/actions/claude-bedrock@v1
        if: steps.harness.outputs.status != 'fail'
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          figma_token: ${{ steps.detect-figma.outputs.found == 'true' && secrets.figma_token || '' }}
          allowed_bots: ${{ inputs.bot_name }}
          aws_role: ${{ inputs.aws_role }}
          aws_region: ${{ inputs.aws_region }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          model: ${{ inputs.model }}
          max_turns: '100'
          prompt: |
            ${{ inputs.project_context != '' && format('## Project Context (provided by repo owner)\n\n{0}\n\n---\n\n', inputs.project_context) || '' }}You are the **Evaluator** for this project.
            You are an INDEPENDENT reviewer — you did NOT generate this code.

            ## Push Mode
            human_push = ${{ steps.push-mode.outputs.human_push }}

            ## Harness MVP

            A deterministic Harness preflight already ran for this PR and wrote `harness-summary.json`.
            Harness status: `${{ steps.harness.outputs.status }}`.

            - If the status is `warn`, read `harness-summary.json` and include the warnings in your evaluation.
            - Treat Harness warnings as concrete evidence, not as model opinions.
            - Harness failures are handled before this step, so you should never approve a PR with unresolved blocking Harness findings.

            **If human_push is "true":** You are in **OBSERVATION MODE**:
            - Post findings as an informational comment only
            - Do NOT add any labels
            - Begin your comment with: "👤 **Human Push Detected — Observation Report**"

            **If human_push is "false":** Run as normal Evaluator.

            Your task:
            1. Read PR #${{ inputs.pr_number }} description to find the linked issue and milestone number
            2. Read the source issue to find the **latest** Planner's Sprint Contract for THIS milestone
            3. Read CLAUDE.md (if it exists) to understand the tech stack, architecture, and conventions.
               Use this to calibrate all evaluation criteria below — apply standards appropriate to the
               actual languages and frameworks in use, not assumed ones.
               Read the relevant SKILL files. Always read these baselines if they exist:
               - `.cursor/skills/clean-code/SKILL.md`
               - `.cursor/skills/refactor/SKILL.md`
               - The touched sub-project's `development-standard/SKILL.md`
            4. Read the PR diff thoroughly
            5. Grade the PR against these dimensions:

            **A. Runtime Verification**
            Verification script: ran=${{ steps.verify-script.outputs.ran }}, result=${{ steps.verify-script.outputs.result }}
            - If result is **"pass"**: ✅ `.github/scripts/pge-verify.sh` passed — builds verified.
            - If result is **"fail"**: already blocked by CI gate before this step; treat as ❌.
            - If result is **"skipped"** (no script found): check if the PR description mentions
              passing build/lint/test for all affected sub-projects.
              Any reported failure → 🔄 CHANGES REQUESTED.

            **B. Requirement Coverage** (Pass/Fail per criterion)
            - For each acceptance criterion in the Sprint Contract: ✅ met / ❌ not met / ⚠️ partially met

            **C. Architecture Compliance**
            - Layer boundaries respected?
            - Naming conventions match SKILL standards?

            **D. SKILL Consistency** (only if `.cursor/skills/` directory exists in the repo)
            - If `.cursor/skills/` does NOT exist, mark this dimension as **N/A** and skip entirely.
            - If it exists, walk through every layer the PR touches:
              1. For each modified directory/module, check whether a corresponding SKILL file exists
                 (e.g. `.cursor/skills/<layer>/SKILL.md`, `<subproject>/.cursor/skills/<domain>/SKILL.md`).
              2. If a matching SKILL file exists: was it updated? Missing update → ❌.
              3. If no matching SKILL file exists for a layer: ⚠️ (informational — new patterns
                 should eventually be documented, but don't block on missing SKILL files).

            **D.1 Cross-cutting pattern audit** — specifically look for these high-miss patterns:
            - Did the diff introduce behavior observable from MULTIPLE routes/modules (e.g. shared
              middleware, global error handler, cross-cutting logging, shared UI component behavior)?
              If so, a shared/architecture SKILL file MUST be updated. Missing → ❌.
            - Did the diff add, rename, or remove an environment variable or config key?
              The corresponding `env-vars/SKILL.md` or config SKILL MUST reflect it. Missing → ❌.
            - Did the diff change CI workflow, label semantics, or prompt text in any
              `.github/workflows/` file? The CI-related SKILL MUST reflect the new behavior. Missing → ❌.

            **D.2 Issue Q&A capture check** — re-read the source issue's Q&A comments and thread.
            For each key technical decision agreed upon (architecture choice, tool selection,
            integration pattern, security rule, naming convention, performance trade-off):
            - Verify it is now discoverable from a SKILL file alone — i.e. someone reading only
              the SKILL files can find this decision without having to re-read the issue.
            - Not captured in any SKILL file → ❌.

            **D.3 PR body `## Skills Updated` check** — locate this section in the PR body.
            - It MUST either (a) list every SKILL file changed, one per bullet, OR (b) enumerate
              each layer touched and justify why no SKILL update was needed for that layer.
            - A bare "no skill updates required" without per-layer justification → ❌.
            - Section missing entirely → ❌.

            Dimension D verdict:
            - **PASS** — every touched layer with an existing SKILL has ✅ or convincing ⚠️; D.2
              and D.3 checks pass
            - **FAIL** — any ❌ in the layer walk, D.1, D.2, or D.3
            - **N/A** — `.cursor/skills/` directory does not exist in the repo

            **E. Code Quality**
            - Validation at external boundaries?
            - Error handling (no swallowed errors, no raw stack traces to UI)?
            - No secrets exposed?

            **F. Design Fidelity** (only when Figma MCP is registered)
            - If `mcp__figma__get_design_context` is available AND a Figma URL exists,
              call the tool and compare against the PR diff.

            **G. Clean Code & Standard Compliance**

            Walk the PR diff and cite file + line for each violation found.
            If `.cursor/skills/clean-code/SKILL.md` exists, apply its rules in addition to the
            sub-dimensions below. If CLAUDE.md specifies language conventions, those take precedence.

            **G.1 — Language / type safety** (apply rules appropriate to the detected language)
            - Untyped or loosely-typed values at module boundaries without justification → ❌
              (e.g. TypeScript `any`/`as any`; Python untyped public API; Java raw types)
            - Non-null / non-optional assertion without an obvious control-flow guarantee → ❌
            - Missing explicit return type on exported/public functions → ⚠️

            **G.2 — Function shape**
            - Function > 50 lines (signature + body + closing brace) and not a pure data mapper → ❌
            - > 4 positional parameters without an options-object refactor → ❌
            - Cyclomatic complexity > 10 (count: `if`, `else if`, `&&`, `||`, `?:`, `case`, `catch`) → ❌
            - Nesting depth > 3 (`if`/`for`/`try`) without guard-clause flattening → ❌
            - Flag arguments (e.g. `doThing(true)` style) → ❌
            - Parameter mutation (`param.field = …` inside a function) → ❌

            **G.3 — Naming**
            - Single-letter names outside ≤ 5-line loops → ❌
            - Boolean variable not named as a predicate (`isX`/`hasX`/`canX`/`shouldX`) → ❌
            - Magic literals (non-trivial numbers or strings) without named constant → ❌
            - Vague suffix: `Manager`/`Helper`/`Util`/`Data`/`Info` where a concrete role exists → ⚠️

            **G.4 — Error handling & async**
            - `catch` block that neither logs with context nor rethrows/maps the error → ❌
            - Debug / temporary logging statements left in production code → ❌
            - Floating promise (no `await`, no `.catch()`, not returned) → ❌
            - `await` inside a sequential loop over independent items where parallel execution
              would be correct → ❌

            **G.5 — Refactor protocol**
            - Drive-by reformatting or renaming mixed into a feature PR → ❌
            - PR diff > 800 LOC without a Planner-issued sub-milestone justification → ⚠️
            - Removed tests without a same-PR replacement or explicit explanation → ❌

            **G — Credentials & secrets (universal, always check)**
            - Hardcoded credentials, tokens, API keys, or sensitive data → ❌

            Dimension G verdict:
            - **PASS** — no ❌ items; ⚠️ items documented and acceptable
            - **FAIL** — ANY ❌ item, OR more than 3 ⚠️ items without justification
            - In OBSERVATION MODE: report ❌s and ⚠️s as informational; do not block

            6. Post your evaluation as a PR comment with overall verdict (NORMAL MODE only):
               ✅ APPROVE / 🔄 CHANGES REQUESTED / ❌ REJECT

            **Verdict aggregation:**
            - Any ❌ in A (Runtime) → 🔄 CHANGES REQUESTED
            - Any ❌ in B (Requirements) → 🔄 CHANGES REQUESTED
            - Dimension D FAIL (layer walk, D.1, D.2, or D.3) → 🔄 CHANGES REQUESTED (skip if D is N/A)
            - Dimension G FAIL (any ❌ item, or > 3 ⚠️ without justification) → 🔄 CHANGES REQUESTED
            - C or E structural violation → 🔄 CHANGES REQUESTED; advisory only → ✅ APPROVE
            - ❌ REJECT reserved for PRs that ignore the Sprint Contract entirely or introduce
              clearly out-of-scope changes
            - Otherwise: ✅ APPROVE

            7. **After posting, apply labels (NORMAL MODE only):**
               - ✅ APPROVE → add `pge/pr:approved`
               - 🔄 CHANGES REQUESTED → add `pge/pr:needs-rework`
               - ❌ REJECT → add `pge/pr:rejected`

      - name: Submit formal GitHub review
        if: steps.pr.outputs.head_ref != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            const isHumanPush = '${{ steps.push-mode.outputs.human_push }}' === 'true';
            if (isHumanPush) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: prNumber, event: 'COMMENT',
                body: '👤 **Observation Mode** — Human push detected. See observation report above.',
              });
              return;
            }
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
            });
            const blockedByHarness = labels.some(l => l.name === 'pge/pr:blocked-by-harness');
            const approved = labels.some(l => l.name === 'pge/pr:approved');
            const needsRework = labels.some(l => l.name === 'pge/pr:needs-rework');
            const rejected = labels.some(l => l.name === 'pge/pr:rejected');
            const event = approved ? 'APPROVE' : (blockedByHarness || needsRework || rejected) ? 'REQUEST_CHANGES' : 'COMMENT';
            const body = blockedByHarness ? 'Harness blocked this PR before Claude evaluation. See the Harness findings comment.'
                       : approved ? '✅ Evaluator approved this PR.'
                       : needsRework ? '🔄 Evaluator requested changes.'
                       : rejected ? '❌ Evaluator rejected this PR.'
                       : '📋 Evaluation complete.';
            await github.rest.pulls.createReview({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber, event, body,
            });

      - name: Notify ready to merge + pipeline next milestone
        if: steps.push-mode.outputs.human_push != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber,
            });
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
            });
            const approved = labels.some(l => l.name === 'pge/pr:approved');
            if (!approved) return;

            const match = pr.title.match(/\[Milestone (\d+)\/(\d+)\]/);
            const milestoneInfo = match ? `Milestone ${match[1]}/${match[2]}` : 'this PR';
            const isLastMilestone = match && parseInt(match[1]) >= parseInt(match[2]);

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number,
              body: `✅ **Evaluator approved ${milestoneInfo}.** Ready for human review and merge.${
                isLastMilestone ? '' : '\n\n🚀 **Next milestone has been triggered automatically** (pipelined).'
              }`
            });

            if (match && !isLastMilestone) {
              const currentMilestone = parseInt(match[1]);
              const totalMilestones = parseInt(match[2]);
              const markerMatch = pr.body && pr.body.match(/<!-- pge-source-issue: (\d+) -->/);
              if (!markerMatch) return;
              const issueNumber = parseInt(markerMatch[1]);

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
                body: `🔗 Milestone ${currentMilestone} approved — pipelining Milestone ${currentMilestone + 1} of ${totalMilestones}...`
              });

              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, name: 'pge/status:implement'
              }).catch(() => {});
              await new Promise(r => setTimeout(r, 2000));
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, labels: ['pge/status:implement']
              });
            }

  # ─── Milestone advancement: PR merged → trigger next milestone ───────────────
  milestone-advance:
    if: inputs.mode == 'milestone-advance'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.github_app_id }}
          private-key: ${{ secrets.github_app_private_key }}

      - name: Advance to next milestone
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber,
            });

            const match = pr.title.match(/\[Milestone (\d+)\/(\d+)\]/);
            if (!match) { console.log('No milestone pattern in PR title.'); return; }
            const current = parseInt(match[1]);
            const total = parseInt(match[2]);

            // Find linked issue
            let issueNumber = null;
            const markerMatch = pr.body && pr.body.match(/<!-- pge-source-issue: (\d+) -->/);
            if (markerMatch) {
              issueNumber = parseInt(markerMatch[1]);
            } else {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: 'pge/status:implement', state: 'open', per_page: 5,
              });
              if (issues.length === 1) issueNumber = issues[0].number;
            }
            if (!issueNumber) { console.log('No linked issue found.'); return; }

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
              body: `✅ Milestone ${current} completed — PR #${pr.number} merged.\n\n${
                current < total
                  ? `🚀 Triggering Milestone ${current + 1} of ${total}...`
                  : `🎉 All ${total} milestones completed. Closing issue.`
              }`
            });

            if (current < total) {
              const { data: issueComments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
              });
              const alreadyPipelined = issueComments.some(c =>
                c.body && c.body.includes(`Milestone ${current} approved — pipelining Milestone ${current + 1}`)
              );
              if (!alreadyPipelined) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issueNumber, name: 'pge/status:implement'
                }).catch(() => {});
                await new Promise(r => setTimeout(r, 2000));
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issueNumber, labels: ['pge/status:implement']
                });
              }
            } else {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, state: 'closed', state_reason: 'completed'
              });
            }
