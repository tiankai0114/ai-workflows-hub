name: "Bug Report"
description: Report a bug in the system
title: "[Bug] "
labels: ["bug", "pge/status:triage"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Frontend
        - Backend / API
        - Infrastructure
        - Unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to the Settings page
        2. Click "Save"
        3. Observe the error message

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical - blocks users / data loss
        - High - major feature broken
        - Medium - workaround available
        - Low - cosmetic / minor
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, version, staging/production?
      placeholder: "Chrome 124, macOS, staging"
