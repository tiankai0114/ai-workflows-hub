name: "PGE"

# ─── One-file PGE integration template ────────────────────────────────────────
#
# Copy this file to your repo as .github/workflows/pge.yml and fill in the
# three sections marked ── CONFIGURE ──.
#
# This single file replaces the five separate workflow files
# (pge-decompose, pge-plan, pge-implement, pge-code-review, pge-evaluate).
#
# Required GitHub secrets in your repo:
#   GH_APP_ID          — GitHub App ID
#   GH_APP_PRIVATE_KEY — GitHub App private key PEM
#   FIGMA_TOKEN        — Figma PAT (optional, only needed for Figma design context)
# ──────────────────────────────────────────────────────────────────────────────

on:
  issues:
    types: [labeled]
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, labeled, closed]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to manually re-evaluate'
        required: true
        type: string

# ── CONFIGURE 1/3 ─────────────────────────────────────────────────────────────
# Replace these three values. Everything else is driven by the hub workflows.
env:
  AWS_ROLE:  "arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"
  BOT_ID:    "YOUR_GITHUB_APP_BOT_USER_ID"   # numeric, e.g. "290981734"
  BOT_NAME:  "your-app[bot]"                 # login name, e.g. "ai-test-kai[bot]"
# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Decompose: split large issue into sub-issues ────────────────────────────
  decompose:
    if: github.event_name == 'issues' && github.event.label.name == 'pge/status:decompose'
    uses: tiankai0114/ai-workflows-hub/.github/workflows/pge-decompose.yml@v1
    with:
      aws_role: "arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"   # ← same as AWS_ROLE above
      # ── CONFIGURE 2/3 — project_context ──────────────────────────────────
      # Describe your tech stack, architecture, and coding constraints.
      # Claude reads CLAUDE.md if this is omitted; set it here to override.
      project_context: |
        Replace this block with your project description.
        - Language / platform: ...
        - Architecture: ...
        - Key libraries: ...
        - Build verification: ...
      # ─────────────────────────────────────────────────────────────────────

  # ── Plan: analyze issue and produce milestone plan ──────────────────────────
  plan:
    if: github.event_name == 'issues' && github.event.label.name == 'pge/status:ready'
    uses: tiankai0114/ai-workflows-hub/.github/workflows/pge-plan.yml@v1
    with:
      aws_role: "arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"
      bot_id:   "YOUR_GITHUB_APP_BOT_USER_ID"
      bot_name: "your-app[bot]"
      project_context: |
        Replace this block with your project description.
        - Language / platform: ...
        - Architecture: ...
        - Key libraries: ...
        - Build verification: ...
    secrets:
      figma_token: ${{ secrets.FIGMA_TOKEN }}

  # ── Implement: generate code (implement) or fix feedback (rework) ───────────
  implement:
    if: |
      (github.event_name == 'issues'       && github.event.label.name == 'pge/status:implement') ||
      (github.event_name == 'pull_request' && github.event.label.name == 'pge/pr:needs-rework')
    uses: tiankai0114/ai-workflows-hub/.github/workflows/pge-implement.yml@v1
    with:
      aws_role:  "arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"
      bot_id:    "YOUR_GITHUB_APP_BOT_USER_ID"
      bot_name:  "your-app[bot]"
      mode:      ${{ (github.event_name == 'pull_request' && github.event.label.name == 'pge/pr:needs-rework') && 'rework' || 'implement' }}
      pr_number: ${{ github.event.pull_request.number || '' }}
      evaluator_workflow_name: "PGE"
      project_context: |
        Replace this block with your project description.
        - Language / platform: ...
        - Architecture: ...
        - Key libraries: ...
        - Build verification: ...
    secrets:
      github_app_id:         ${{ secrets.GH_APP_ID }}
      github_app_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      figma_token:           ${{ secrets.FIGMA_TOKEN }}

  # ── Code Review: review human-authored PRs ──────────────────────────────────
  code-review:
    if: |
      github.event_name == 'pull_request' &&
      contains(fromJSON('["opened","synchronize","ready_for_review","reopened"]'), github.event.action) &&
      !endsWith(github.event.pull_request.user.login, '[bot]') &&
      !contains(github.event.pull_request.title, '[Milestone') &&
      !endsWith(github.event.sender.login, '[bot]')
    uses: tiankai0114/ai-workflows-hub/.github/workflows/pge-code-review.yml@v1
    with:
      aws_role: "arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"
      project_context: |
        Replace this block with your project description.
        - Language / platform: ...
        - Architecture: ...
        - Key libraries: ...
        - Special review focus: ...
    secrets:
      figma_token: ${{ secrets.FIGMA_TOKEN }}

  # ── Evaluate (human review → rework): human CHANGES_REQUESTED on bot PR ────
  evaluate-human-rework:
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested' &&
      !endsWith(github.event.review.user.login, '[bot]')
    uses: tiankai0114/ai-workflows-hub/.github/workflows/pge-evaluate.yml@v1
    with:
      aws_role:  "arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"
      bot_id:    "YOUR_GITHUB_APP_BOT_USER_ID"
      bot_name:  "your-app[bot]"
      mode:      "human-rework"
      pr_number: ${{ github.event.pull_request.number }}
    secrets:
      github_app_id:         ${{ secrets.GH_APP_ID }}
      github_app_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

  # ── Evaluate: Claude evaluates bot-authored PRs (or manual dispatch) ────────
  evaluate:
    if: |
      (
        github.event_name == 'workflow_dispatch'
      ) || (
        github.event_name == 'pull_request' &&
        github.event.action != 'closed' &&
        (
          endsWith(github.event.pull_request.user.login, '[bot]') ||
          contains(github.event.pull_request.title, '[Milestone')
        )
      )
    uses: tiankai0114/ai-workflows-hub/.github/workflows/pge-evaluate.yml@v1
    with:
      aws_role:  "arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"
      bot_id:    "YOUR_GITHUB_APP_BOT_USER_ID"
      bot_name:  "your-app[bot]"
      mode:      "evaluate"
      pr_number: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
      # ── CONFIGURE 3/3 — project_context (evaluation focus) ───────────────
      project_context: |
        Replace this block with your project description.
        - Language / platform: ...
        - Architecture: ...
        - Key libraries: ...
        - Build verification: ...
        Evaluation focus:
        - ...
      # ─────────────────────────────────────────────────────────────────────
    secrets:
      github_app_id:         ${{ secrets.GH_APP_ID }}
      github_app_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      figma_token:           ${{ secrets.FIGMA_TOKEN }}

  # ── Milestone advancement: merged milestone PR → trigger next milestone ──────
  milestone-advance:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, '[Milestone')
    uses: tiankai0114/ai-workflows-hub/.github/workflows/pge-evaluate.yml@v1
    with:
      aws_role:  "arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"
      bot_id:    "YOUR_GITHUB_APP_BOT_USER_ID"
      bot_name:  "your-app[bot]"
      mode:      "milestone-advance"
      pr_number: ${{ github.event.pull_request.number }}
    secrets:
      github_app_id:         ${{ secrets.GH_APP_ID }}
      github_app_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
